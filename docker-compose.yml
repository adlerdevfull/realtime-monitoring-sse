services:
  app:
    build: { context: ., dockerfile: docker/Dockerfile, target: development }
    volumes: [".:/var/www/html"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: &app-env
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: realtime_panel
      DB_USERNAME: app
      DB_PASSWORD: secret
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    networks: [app-network]

  nginx:
    image: nginx:alpine
    ports: ["8130:80"]
    volumes: [".:/var/www/html", "./docker/nginx.conf:/etc/nginx/conf.d/default.conf"]
    depends_on: [app]
    networks: [app-network]

  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: realtime_panel, POSTGRES_USER: app, POSTGRES_PASSWORD: secret }
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U app -d realtime_panel"], interval: 5s, timeout: 5s, retries: 5 }
    networks: [app-network]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 5s, retries: 5 }
    networks: [app-network]

  queue:
    build: { context: ., dockerfile: docker/Dockerfile, target: development }
    command: sh -c "while [ ! -f vendor/autoload.php ]; do sleep 1; done; php artisan queue:work --tries=3 --timeout=90"
    volumes: [".:/var/www/html"]
    depends_on: [app]
    environment: *app-env
    networks: [app-network]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    volumes: ["./frontend:/app", "/app/node_modules"]
    depends_on: [nginx]
    networks: [app-network]

volumes:
  postgres_data:

networks:
  app-network: { driver: bridge }
