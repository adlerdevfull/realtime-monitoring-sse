name: CI
on: { push: { branches: [main] }, pull_request: { branches: [main] } }
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres: { image: "postgres:16-alpine", env: { POSTGRES_DB: rt_test, POSTGRES_USER: app, POSTGRES_PASSWORD: secret }, ports: ["5432:5432"], options: "--health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5" }
      redis: { image: "redis:7-alpine", ports: ["6379:6379"], options: "--health-cmd 'redis-cli ping' --health-interval 10s --health-timeout 5s --health-retries 5" }
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.2", extensions: "pdo_pgsql, redis, bcmath, intl", coverage: xdebug }
      - run: composer install --prefer-dist --no-progress
      - run: cp .env.example .env && php artisan key:generate
      - run: vendor/bin/phpstan analyse --memory-limit=512M
      - run: vendor/bin/pest --coverage --min=75
        env: { DB_HOST: "127.0.0.1", DB_DATABASE: rt_test, DB_USERNAME: app, DB_PASSWORD: secret, REDIS_HOST: "127.0.0.1" }
