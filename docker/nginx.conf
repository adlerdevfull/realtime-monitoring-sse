server {
    listen 80; root /var/www/html/public; index index.php; client_max_body_size 10M;

    # SSE endpoint - disable buffering
    location /api/v1/events {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        fastcgi_buffering off;
        proxy_buffering off;
        chunked_transfer_encoding off;
        fastcgi_read_timeout 3600;
    }

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ { fastcgi_pass app:9000; fastcgi_index index.php; fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name; include fastcgi_params; }
}
